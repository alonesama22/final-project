<!doctype html>

  <title>Reaction Images Gallery</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffe2e2;
      text-align: center;
    }

    h1 {
      margin: 40px;
	  font-size: 3em;
    }

    h2 {
      margin: 60px;
      font-size: 1.5em;
    }

	p {
	font-size: 2em;
	}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 150px;
  max-width: 1200px;
  margin: auto;
}

.item {
  text-align: center;
}

.box {
  background: rgb(255, 238, 238);
  border-radius: 10px;
  aspect-ratio: 1 / 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box img {
  width: 70%;
  object-fit: cover;
}

.caption {
  margin-top: 10px;
}

.item img {
      width: 70%;
      height: auto;
      object-fit: cover;
}

.item:hover {
      transform: scale(1.05);
      transition: 0.2s;
}


  </style>
</head>
