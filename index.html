<!doctype html>
<html lang="en">

  <title>Comment Reaction Gallery</title>

  <style>
    body {
      font-family: Brush Script MT, cursive;
      background-color: #ffcece;
      text-align: center;
    }

    h1 {
      margin: 100px;
      font-size: 6em;
    }

    h2 {
      margin: px;
      font-size: 2.2em;
    }

    p {
      font-size: 1.8em;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 150px;
      max-width: 1200px;
      margin: auto;
      margin-top: 400px;
    }

    .item {
      text-align: center;
    }

    .box {
      background: rgb(255, 217, 217);
      border-radius: 10px;
      aspect-ratio: 1 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .box img {
      width: 100%;
      object-fit: cover;
    }

    .caption {
      margin-top: 2px;
    }

    .item img {
      width: 70%;
      height: auto;
      object-fit: cover;
    }

    .item:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }

    .title-box {
      background-color: #f3d6d6;
      width: fit-content;
      margin: 40px auto;
      padding: 60px 140px;
      border-radius: 40px;
      margin-top: 240px;
    }

    .title-box h1 {
      margin: 0;
      font-size: 80px;
    }
  </style>

</head>
